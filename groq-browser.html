<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroqChat Browser</title>
    <!-- Библиотеки -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .prose pre { background: #000 !important; border: 1px solid #27272a; border-radius: 0.75rem; padding: 1rem; }
        .prose code { color: #60a5fa; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#09090b',
                        sidebar: '#18181b',
                        border: '#27272a',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Иконка через Lucide
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const Markdown = ({ content }) => {
            const html = useMemo(() => {
                const rawHtml = marked.parse(content);
                return { __html: rawHtml };
            }, [content]);

            useEffect(() => {
                document.querySelectorAll('pre code').forEach((el) => {
                    hljs.highlightElement(el);
                });
            }, [html]);

            return <div className="prose prose-invert max-w-none break-words" dangerouslySetInnerHTML={html} />;
        };

        const App = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('groq_api_key') || '');
            const [showApiModal, setShowApiModal] = useState(!localStorage.getItem('groq_api_key'));
            const [history, setHistory] = useState(JSON.parse(localStorage.getItem('chat_history') || '[]'));
            const [currentChatId, setCurrentChatId] = useState(null);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [streamingMessage, setStreamingMessage] = useState('');
            const [selectedModel, setSelectedModel] = useState('llama-3.3-70b-versatile');
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);

            const messagesEndRef = useRef(null);
            const abortControllerRef = useRef(null);

            const currentChat = history.find(c => c.id === currentChatId);

            useEffect(() => {
                localStorage.setItem('chat_history', JSON.stringify(history));
            }, [history]);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [currentChat?.messages, streamingMessage]);

            const handleSaveKey = (e) => {
                e.preventDefault();
                const key = e.target.key.value.trim();
                if (key.startsWith('gsk_')) {
                    setApiKey(key);
                    localStorage.setItem('groq_api_key', key);
                    setShowApiModal(false);
                } else {
                    alert('Неверный формат ключа');
                }
            };

            const sendMessage = async () => {
                if (!input.trim() || isLoading) return;

                const userMsg = input.trim();
                setInput('');

                let chatId = currentChatId;
                let newHistory = [...history];

                if (!chatId) {
                    chatId = Date.now().toString();
                    const newChat = {
                        id: chatId,
                        title: userMsg.slice(0, 30),
                        messages: [{ role: 'user', content: userMsg }],
                        createdAt: Date.now()
                    };
                    newHistory = [newChat, ...history];
                    setHistory(newHistory);
                    setCurrentChatId(chatId);
                } else {
                    newHistory = history.map(c => 
                        c.id === chatId ? { ...c, messages: [...c.messages, { role: 'user', content: userMsg }] } : c
                    );
                    setHistory(newHistory);
                }

                setIsLoading(true);
                setStreamingMessage('');
                abortControllerRef.current = new AbortController();

                try {
                    const chat = newHistory.find(c => c.id === chatId);
                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: selectedModel,
                            messages: chat.messages,
                            stream: true
                        }),
                        signal: abortControllerRef.current.signal
                    });

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullText = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');
                        
                        for (const line of lines) {
                            if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                                try {
                                    const data = JSON.parse(line.slice(6));
                                    const content = data.choices[0]?.delta?.content || '';
                                    fullText += content;
                                    setStreamingMessage(fullText);
                                } catch (e) {}
                            }
                        }
                    }

                    setHistory(prev => prev.map(c => 
                        c.id === chatId ? { ...c, messages: [...c.messages, { role: 'assistant', content: fullText }] } : c
                    ));
                } catch (err) {
                    if (err.name !== 'AbortError') alert('Ошибка: ' + err.message);
                } finally {
                    setIsLoading(false);
                    setStreamingMessage('');
                }
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-64 bg-sidebar border-r border-border flex flex-col">
                        <div className="p-4">
                            <button 
                                onClick={() => setCurrentChatId(null)}
                                className="w-full flex items-center justify-center gap-2 bg-zinc-800 hover:bg-zinc-700 p-2 rounded-xl border border-zinc-700 transition-all"
                            >
                                <Icon name="plus" /> Новый чат
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto px-2 space-y-1">
                            {history.map(chat => (
                                <div 
                                    key={chat.id}
                                    onClick={() => setCurrentChatId(chat.id)}
                                    className={`p-3 rounded-xl cursor-pointer flex items-center gap-2 truncate text-sm transition-all ${currentChatId === chat.id ? 'bg-zinc-800' : 'hover:bg-zinc-900 text-zinc-400'}`}
                                >
                                    <Icon name="message-square" className="w-4 h-4 opacity-50" />
                                    {chat.title}
                                </div>
                            ))}
                        </div>
                        <div className="p-4 border-t border-border">
                            <button onClick={() => setIsSettingsOpen(true)} className="flex items-center gap-2 text-zinc-400 hover:text-white transition-all text-sm">
                                <Icon name="settings" /> Настройки
                            </button>
                        </div>
                    </div>

                    {/* Main */}
                    <main className="flex-1 flex flex-col relative">
                        <div className="flex-1 overflow-y-auto p-4">
                            <div className="max-w-3xl mx-auto space-y-8 py-8">
                                {!currentChat && (
                                    <div className="text-center pt-20">
                                        <div className="w-16 h-16 bg-blue-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                            <Icon name="sparkles" className="w-8 h-8 text-blue-500" />
                                        </div>
                                        <h1 className="text-3xl font-bold mb-4">Чем помочь?</h1>
                                        <p className="text-zinc-500">Браузерная версия GroqChat</p>
                                    </div>
                                )}
                                
                                {currentChat?.messages.map((m, i) => (
                                    <div key={i} className={`flex gap-4 ${m.role === 'user' ? 'justify-end' : ''}`}>
                                        <div className={`max-w-[85%] p-4 rounded-2xl ${m.role === 'user' ? 'bg-blue-600' : 'bg-zinc-900 border border-zinc-800'}`}>
                                            <Markdown content={m.content} />
                                        </div>
                                    </div>
                                ))}
                                {streamingMessage && (
                                    <div className="flex gap-4">
                                        <div className="max-w-[85%] p-4 rounded-2xl bg-zinc-900 border border-zinc-800">
                                            <Markdown content={streamingMessage} />
                                        </div>
                                    </div>
                                )}
                                <div ref={messagesEndRef} />
                            </div>
                        </div>

                        {/* Input */}
                        <div className="p-4 bg-background/80 backdrop-blur-md">
                            <div className="max-w-3xl mx-auto relative">
                                <textarea 
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), sendMessage())}
                                    placeholder="Спросите Groq..."
                                    className="w-full bg-zinc-900 border border-zinc-800 rounded-2xl p-4 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500/50 resize-none"
                                    rows="1"
                                />
                                <button 
                                    onClick={sendMessage}
                                    className="absolute right-3 bottom-3 p-2 bg-white text-black rounded-xl hover:bg-zinc-200 transition-all"
                                >
                                    <Icon name={isLoading ? "square" : "send"} className="w-5 h-5" />
                                </button>
                            </div>
                        </div>
                    </main>

                    {/* API Key Modal */}
                    {showApiModal && (
                        <div className="fixed inset-0 glass z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleSaveKey} className="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl max-w-md w-full shadow-2xl">
                                <h2 className="text-2xl font-bold mb-4">Введите API Ключ</h2>
                                <p className="text-zinc-500 mb-6 text-sm">Ваш ключ Groq (gsk_...) будет сохранен только в вашем браузере.</p>
                                <input name="key" type="password" placeholder="gsk_..." className="w-full bg-black border border-zinc-800 p-3 rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none" required />
                                <button className="w-full bg-white text-black font-bold p-3 rounded-xl hover:bg-zinc-200 transition-all">Начать работу</button>
                            </form>
                        </div>
                    )}

                    {/* Settings Modal */}
                    {isSettingsOpen && (
                        <div className="fixed inset-0 glass z-50 flex items-center justify-center p-4">
                            <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl max-w-md w-full shadow-2xl relative">
                                <button onClick={() => setIsSettingsOpen(false)} className="absolute top-4 right-4 text-zinc-500 hover:text-white">
                                    <Icon name="x" />
                                </button>
                                <h2 className="text-xl font-bold mb-6">Настройки</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs text-zinc-500 block mb-2 uppercase">Модель</label>
                                        <select 
                                            value={selectedModel} 
                                            onChange={(e) => setSelectedModel(e.target.value)}
                                            className="w-full bg-black border border-zinc-800 p-3 rounded-xl outline-none"
                                        >
                                            <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
                                            <option value="llama-3.1-8b-instant">Llama 3.1 8B</option>
                                            <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
                                        </select>
                                    </div>
                                    <button 
                                        onClick={() => { localStorage.removeItem('groq_api_key'); location.reload(); }}
                                        className="w-full text-red-500 text-sm hover:underline"
                                    >
                                        Сбросить API Ключ
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
